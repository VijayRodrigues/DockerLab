name: redis_docker

services:
  redis_docker:
    image: redis:8
    container_name: redis_docker

    env_file:
      - .env

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - redis_docker_data:/data

    restart: unless-stopped

volumes:
  redis_docker_data:
    name: redis_docker_data

networks:
  default:
    external: true
    name: dockerlab_network    