name: minio_docker

services:
  minio_docker:
    image: minio/minio:latest
    container_name: minio_docker

    env_file:
      - .env

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ}

    command: server /data --console-address ":9001"

    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

    volumes:
      - minio_docker_data:/data

    restart: unless-stopped

networks:
  default:
    external: true
    name: dockerlab_network

volumes:
  minio_docker_data:
    name: minio_docker_data