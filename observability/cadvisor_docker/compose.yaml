name: cadvisor_docker

services:
  cadvisor_docker:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor_docker

    env_file:
      - .env

    ports:
      - "${CADVISOR_PORT}:8080"

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

    restart: unless-stopped

networks:
  default:
    external: true
    name: dockerlab_network