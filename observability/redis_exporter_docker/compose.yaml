name: redis_exporter_docker

services:
  redis_exporter_docker:
    image: oliver006/redis_exporter:v1.69.0
    container_name: redis_exporter_docker

    env_file:
      - .env

    command:
      - "--redis.addr=redis://${REDIS_HOST}:${REDIS_PORT}"
      - "--redis.password=${REDIS_PASSWORD}"

    ports:
      - "${REDIS_EXPORTER_PORT}:9121"

    restart: unless-stopped

networks:
  default:
    external: true
    name: dockerlab_network