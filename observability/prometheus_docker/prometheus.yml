global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - prometheus_docker:9090

  - job_name: "node_exporter"
    static_configs:
      - targets:
          - node_exporter_docker:9100

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - cadvisor_docker:8080

  - job_name: "postgres_exporter"
    static_configs:
      - targets:
          - postgres_exporter_docker:9187