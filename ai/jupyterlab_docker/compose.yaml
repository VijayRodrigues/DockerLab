name: jupyterlab_docker

services:

  jupyterlab:

    build: .

    image: jupyterlab_docker:latest

    container_name: jupyterlab_docker

    restart: unless-stopped

    ports:
      - "${JUPYTER_PORT}:8888"

    environment:
      TZ: ${TZ}

    volumes:
      - ./notebooks:/workspace/notebooks
      - ./data:/workspace/data
      - ./scripts:/workspace/scripts

    networks:
      - default

networks:
  default:
    external: true
    name: dockerlab_network