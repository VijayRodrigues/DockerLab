name: open_webui_docker

services:

  open-webui:

    image: ghcr.io/open-webui/open-webui:main

    container_name: open_webui_docker

    restart: unless-stopped

    ports:
      - "${OPEN_WEBUI_PORT}:8080"

    environment:
      TZ: ${TZ}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}

    volumes:
      - ./data:/app/backend/data

    networks:
      - default

networks:
  default:
    external: true
    name: dockerlab_network