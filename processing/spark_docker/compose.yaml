name: spark_docker

services:

  spark-master:
    image: ${SPARK_IMAGE}

    container_name: spark_master_docker

    hostname: spark-master

    restart: unless-stopped

    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=${SPARK_MASTER_PORT}
      - TZ=${TZ}

    ports:
      - "${SPARK_MASTER_PORT}:7077"
      - "${SPARK_MASTER_WEBUI_PORT}:8080"

    volumes:
      - ./jobs:/opt/bitnami/spark/jobs
      - ./data:/opt/bitnami/spark/data
      - ./jars:/opt/bitnami/spark/jars
      - ./logs:/opt/bitnami/spark/logs

    networks:
      - default

  spark-worker:

    image: ${SPARK_IMAGE}

    container_name: spark_worker_docker

    hostname: spark-worker

    restart: unless-stopped

    depends_on:
      - spark-master

    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - TZ=${TZ}

    ports:
      - "${SPARK_WORKER_WEBUI_PORT}:8081"

    volumes:
      - ./jobs:/opt/bitnami/spark/jobs
      - ./data:/opt/bitnami/spark/data
      - ./jars:/opt/bitnami/spark/jars
      - ./logs:/opt/bitnami/spark/logs

    networks:
      - default

networks:
  default:
    external: true
    name: dockerlab_network