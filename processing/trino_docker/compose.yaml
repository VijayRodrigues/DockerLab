name: trino_docker

services:
  trino_docker:
    image: trinodb/trino:477

    container_name: trino_docker

    ports:
      - "${TRINO_PORT}:8080"

    volumes:
      - ./etc:/etc/trino
      - ./catalog:/etc/trino/catalog

    restart: unless-stopped

    networks:
      - default

networks:
  default:
    external: true
    name: dockerlab_network